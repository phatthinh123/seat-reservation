services:
  postgres:
    image: postgres:15
    container_name: seat-reservation-postgres
    environment:
      POSTGRES_DB: seatreservation
      POSTGRES_USER: seat
      POSTGRES_PASSWORD: seat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seat -d seatreservation"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seat-reservation-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: seat-reservation-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy

  mock-payment-service:
    build:
      context: ./mock-payment-service
      dockerfile: Dockerfile
    container_name: seat-reservation-mock-payment
    environment:
      WEBHOOK_URL: ${WEBHOOK_URL:-http://backend:8080/api/webhooks/payment}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-local-dev-secret}
    ports:
      - "9090:9090"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seat-reservation-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-seatreservation}
      DB_USER: ${DB_USER:-seat}
      DB_PASS: ${DB_PASS:-seat}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/seat-reservation}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-local-dev-secret}
      MOCK_PAYMENT_URL: ${MOCK_PAYMENT_URL:-http://mock-payment-service:9090}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
      mock-payment-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seat-reservation-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
